<!DOCTYPE html>
<html>
<head>
    <title>Society Survey</title>
</head>
<body>

    <h1>Society Survey Page</h1>

    <form>

        <h3>Cleanliness Satisfaction</h3>
        <input type="radio" name="clean"> Excellent
        <input type="radio" name="clean"> Good
        <input type="radio" name="clean"> Poor

        <h3>Security Service Feedback</h3>
        <input type="checkbox"> CCTV
        <input type="checkbox"> Guards
        <input type="checkbox"> Gate Management

        <h3>Parking Issues</h3>
        <select>
            <option>No Issue</option>
            <option>Limited Parking</option>
            <option>Visitor Parking Problem</option>
        </select>

        <h3>Water Supply Feedback</h3>
        <textarea rows="3" cols="30"></textarea>

        <h3>Maintenance Quality</h3>
        <input type="radio" name="maint"> Good
        <input type="radio" name="maint"> Average
        <input type="radio" name="maint"> Poor

        <h3>Suggestions</h3>
        <textarea rows="4" cols="40"></textarea>

        <br><br>
        <button type="submit">Submit Survey</button>

    </form>

</body>
</html>
